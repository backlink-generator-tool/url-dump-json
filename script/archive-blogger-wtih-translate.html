  return pattern.test(url);

function normalizeURL(url){ if(typeof url!=='string') return ""; return url.replace(/([^:]\/)\/+/g,"$1"); }

/* ============================================================
     🔥 HARDENED updateDefaultURLs() — JS + JSON support
     Keeps blogspot-only filter unique to this file.
   ============================================================ */
async function updateDefaultURLs() {
  const wait = (ms) => new Promise(res => setTimeout(res, ms));

  async function importModuleFromText(jsText) {
    const blob = new Blob([jsText], { type: 'application/javascript' });
    const blobUrl = URL.createObjectURL(blob);
    try { return await import(blobUrl); } finally { URL.revokeObjectURL(blobUrl); }
  }
  function extractFromJSON(data) {
    if (Array.isArray(data)) return data.slice();
    for (const key of ['urls','items','data','list']) {
      if (Array.isArray(data?.[key])) return data[key].slice();
    }
    if (data && typeof data === 'object') {
      for (const k of Object.keys(data)) if (Array.isArray(data[k])) return data[k].slice();
    }
    return [];
  }
  async function extractFromModule(mod) {
    if (!mod) return [];
    if (Array.isArray(mod.default)) return mod.default.slice();
    for (const key of ['urls','items','data','list','pins','pinIds']) {
      if (Array.isArray(mod[key])) return mod[key].slice();
    }
    for (const fn of ['build','load','get']) {
      if (typeof mod[fn] === 'function') {
        try { const out = await mod[fn](); if (Array.isArray(out)) return out.slice(); } catch(e){}
      }
    }
    return [];
  }
  async function loadViaScriptAndWait(url, { timeout = 4000, pollInterval = 100 } = {}) {
    const GLOBAL_KEYS = ["REMOTE_URLS","REMOTE_DATA","REMOTE_ARRAY","FETCH_JS_DATA","FETCH_DATA","urls","items","pins","PIN_IDS"];
    return new Promise((resolve) => {
      let script = document.createElement('script');
      script.async = true; script.src = url;
      let finished = false, timer = null;
      function onProducerEvent(e) {
        if (finished) return; finished = true; cleanup();
        resolve((e && e.detail && Array.isArray(e.detail.urls)) ? e.detail.urls.slice() : []);
      }
      function startPolling() {
        const start = Date.now();
        (function poll() {
          if (finished) return;
          if (window.FETCH_JS_READY instanceof Promise) {
            window.FETCH_JS_READY.then((res) => {
              if (finished) return; finished = true; cleanup();
              if (Array.isArray(res)) return resolve(res.slice());
            }).catch(() => {});
          }
          for (const k of GLOBAL_KEYS) {
            const val = window[k];
            if (Array.isArray(val) && val.length) { finished = true; cleanup(); return resolve(val.slice()); }
          }
          if (Date.now() - start >= timeout) { finished = true; cleanup(); return resolve([]); }
          setTimeout(poll, pollInterval);
        })();
      }
      function cleanup() {
        try { window.removeEventListener('remoteUrlsReady', onProducerEvent); } catch(e){}
        if (timer) { clearTimeout(timer); timer = null; }
        try { if (script && script.parentNode) script.parentNode.removeChild(script); } catch(e){}
      }
      script.onerror = () => { if (finished) return; finished = true; cleanup(); resolve([]); };
      script.onload  = () => { startPolling(); };
      window.addEventListener('remoteUrlsReady', onProducerEvent, { once: true });
      document.head.appendChild(script);
      timer = setTimeout(() => { if (finished) return; finished = true; cleanup(); resolve([]); }, timeout + 1000);
    });
  }

  /* Blogspot-only filter — unique to this file */
  function filterBlogspot(arr) {
    return arr.filter(url => {
      try {
        const host = new URL(url).hostname;
        return host === "blogspot.com" || host.endsWith(".blogspot.com");
      } catch { return false; }
    });
  }

  const urls = fetchURLs.slice(); shuffle(urls);
  for (const u of urls) {
    try {
      console.log("🔎 Trying to fetch URL list from:", u);
      const path = u.split('?')[0].toLowerCase();

      if (path.endsWith('.json')) {
        try {
          const r = await fetch(u);
          if (!r.ok) throw new Error('HTTP ' + r.status);
          const arr = filterBlogspot(extractFromJSON(await r.json()));
          if (arr.length) { fetchData.length = 0; fetchData.push(...arr); console.log('✅ Loaded', arr.length, 'Blogspot URLs from JSON:', u); return; }
          else console.warn('⚠ JSON fetched but no Blogspot URLs found:', u);
        } catch (e) { console.warn('⚠ JSON fetch failed:', u, e && e.message); }
        continue;
      }

      if (path.endsWith('.js') || path.endsWith('.mjs')) {
        try {
          const r = await fetch(u);
          if (r.ok) {
            const arr = filterBlogspot(await extractFromModule(await importModuleFromText(await r.text())));
            if (arr.length) { fetchData.length = 0; fetchData.push(...arr); console.log('✅ Loaded', arr.length, 'Blogspot URLs from JS module:', u); return; }
            else console.warn('⚠ Module imported but no Blogspot URLs found:', u);
          }
        } catch (e) { console.warn('⚠ Module fetch/import failed:', u, e && e.message); }

        let final = [];
        for (let attempt = 1; attempt <= 3; attempt++) {
          if (attempt > 1) await wait((attempt - 1) * 250);
          const arr = await loadViaScriptAndWait(u, { timeout: 2000 + attempt * 1000, pollInterval: 120 });
          if (Array.isArray(arr) && arr.length) { final = filterBlogspot(arr); break; }
        }
        if (final.length) { fetchData.length = 0; fetchData.push(...final); console.log('✅ Loaded', final.length, 'Blogspot URLs from JS script:', u); return; }
        else console.warn('⚠ JS script fallback returned no Blogspot data:', u);
        continue;
      }

      // Unknown extension
      try {
        const r = await fetch(u);
        if (r.ok) {
          const arr = filterBlogspot(extractFromJSON(await r.json().catch(() => null)));
          if (arr.length) { fetchData.length = 0; fetchData.push(...arr); return; }
        }
      } catch(_) {}
      const arr2 = filterBlogspot(await loadViaScriptAndWait(u, { timeout: 3500 }));
      if (arr2.length) { fetchData.length = 0; fetchData.push(...arr2); return; }

    } catch (err) { console.warn('⚠ Failed to load', u, err && err.message); }
  }
  console.warn('⚠ Using fallback Blogspot URLs. fetchData length:', fetchData.length);
}

function buildMap(url) {
  const p = new URL(url);
  const parts = p.hostname.split('.');
  const ln = parts.length;
  const hostnameNoWWW = p.hostname.replace(/^www\./i, '');
  let map = {
    PROTOCOL:        p.protocol,
    SUBDOMAIN:       ln > 2 ? parts.slice(0, ln - 2).join('.') + '.' : '',
    DOMAINNAME:      parts[ln - 2] || '',
    TLD:             parts[ln - 1] || '',
    HOST:            p.hostname,
    PORT:            p.port ? ':' + p.port : '',
    PATH:            p.pathname,
    QUERY:           p.search,
    PARAMS:          p.search ? p.search.slice(1) : '',
    FRAGMENT:        p.hash,
    URL:             url,
    DOMAIN:          p.hostname,
    NOPROTOCOL_URL:  `${p.hostname}${p.pathname}${p.search}${p.hash}`,
    NOSUBDOMAIN_URL: `${hostnameNoWWW}${p.pathname}${p.search}${p.hash}`,
    SHORT_CODE:      randomURL(shortArchiveCodes)
  };
  Object.keys(map).forEach(k => {
    try { map['ENCODE_' + k] = encodeURIComponent(map[k]); } catch { map['ENCODE_' + k] = ''; }
  });
  return map;
}
function replacePlaceholders(tpl, map) {
  return tpl.replace(/(\{\{|\[)\s*(ENCODE_)?([A-Z0-9_]+)\s*(\}\}|\])/gi,
    (match, open, encPrefix, key, close, offset, fullStr) => {
      if (!key) return '';
      key = key.toUpperCase();
      if (encPrefix) {
        const ek = 'ENCODE_' + key;
        if (map.hasOwnProperty(ek)) return map[ek];
        try { return encodeURIComponent(map[key] || ''); } catch { return ''; }
      }
      if (key === 'URL') {
        const before = fullStr.slice(Math.max(0, offset - 30), offset).toLowerCase();
        if (/\burl\s*=\s*$/.test(before) || /\burl\s*=\s*/i.test(fullStr)) {
          try { return encodeURIComponent(map['URL'] || ''); } catch { return map['URL'] || ''; }
        }
      }
      return map[key] || '';
    });
}
function generateUrl(tpl, normUrl) {
  if (!tpl) return '';
  tpl = tpl
    .replace(/%5B\s*(ENCODE_)?([A-Z0-9_]+)\s*%5D/gi, '[$1$2]')
    .replace(/&#(?:x5b|91);\s*(ENCODE_)?([A-Z0-9_]+)\s*&#(?:x5d|93);/gi, '[$1$2]')
    .replace(/\{\{\s*(ENCODE_)?([A-Z0-9_]+)\s*\}\}/gi, '[$1$2]')
    .replace(/%7B%7B\s*(ENCODE_)?([A-Z0-9_]+)\s*%7D%7D/gi, '[$1$2]');
  return replacePlaceholders(tpl, buildMap(normUrl));
}

/* ============================================================
     Blogger subdomain helper + Google Translate URL builder
     (unique to this file — preserved exactly)
   ============================================================ */
function getSubdomain(url) {
  const hostname = new URL(url).hostname;       // e.g. linkboosttool.blogspot.com
  const parts    = hostname.split('.');         // ["linkboosttool", "blogspot", "com"]
  return parts.length > 2 ? parts[0] : null;   // "linkboosttool"
}

function generateTargetURL() {
  if (!fetchData.length) return "";
  const languageCode = randomURL(languageCodes);
  const translateUrl = randomURL(googleTranslateUrls).replace(/{{LANGUAGE_CODES}}/g, languageCode);
  const url          = randomURL(fetchData);
  const subdomain    = getSubdomain(url);
  return normalizeURL(translateUrl.replace(/{{SUBDOMAIN}}/g, subdomain));
}

/* ============================================================
     Archive site definitions
     ① Form-submit  — action, method (POST|GET), inputName, extraParams
     ② URL-template — urlTemplate w/ [PLACEHOLDER] support, method: "GET_NAV"

     NOTE: The original file had WAYBACK_SAVE_ENDPOINT = "https://web.archive.org/save/{{URL}}"
     used as a form action — the {{URL}} was never substituted (bug).
     Corrected here as a proper GET_NAV entry: the full URL is embedded
     in the path, which is what was clearly intended.
   ============================================================ */
const ARCHIVE_SITES = [
  /* Wayback Machine: snapshot via POST (standard) */
  [
    {
      name: "Wayback POST",
      action: "https://web.archive.org/save",
      method: "POST",
      inputName: "url",
      extraParams: {}
    }
  ],
  /* Wayback Machine: viewer + save-path URL-templates (navigates iframe directly) */
  [
    {
      name: "Wayback Save Path",
      urlTemplate: "https://web.archive.org/save/[ENCODE_URL]",
      method: "GET_NAV"
    },
    {
      name: "Wayback CDX View",
      urlTemplate: "https://web.archive.org/web/*/[ENCODE_URL]",
      method: "GET_NAV"
    },
    {
      name: "Wayback Direct View",
      urlTemplate: "https://web.archive.org/web/[ENCODE_URL]",
      method: "GET_NAV"
    }
  ]
];

function chooseRandomArchive() {
  const group = ARCHIVE_SITES[Math.floor(Math.random() * ARCHIVE_SITES.length)];
  return group[Math.floor(Math.random() * group.length)];
}

function ensureContainer() {
  return document.getElementById("stealthIFrameContainer")
      || document.body
      || document.documentElement;
}

function buildAndSubmitArchiveForm(site, targetUrl, targetFrameName) {
  if (!site || !targetUrl) return;
  try {
    const form = document.createElement("form");
    form.style.display  = "none";
    form.method         = site.method || "POST";
    form.action         = site.action;
    form.referrerPolicy = "no-referrer";
    form.target         = targetFrameName || "_self";

    const urlInput  = document.createElement("input");
    urlInput.type   = (site.method === "GET") ? "text" : "hidden";
    urlInput.name   = site.inputName || "url";
    urlInput.value  = targetUrl;
    form.appendChild(urlInput);

    if (site.extraParams) {
      for (const [k, v] of Object.entries(site.extraParams)) {
        const inp = document.createElement("input");
        inp.type = "hidden"; inp.name = k; inp.value = v;
        form.appendChild(inp);
      }
    }

    const container = ensureContainer();
    container.appendChild(form);
    console.log(`📨 Submitting to ${site.name} (${site.action}) via ${site.method} target=${form.target} url=${targetUrl}`);
    form.submit();
    setTimeout(() => { try { form.remove(); } catch(e){} }, 1000);
  } catch (err) {
    console.error("❌ buildAndSubmitArchiveForm error:", err);
  }
}

function submitToArchiveInFrame(iframe) {
  try {
    const targetUrl = generateTargetURL();
    if (!targetUrl || !isValidURL(targetUrl)) {
      console.warn("⚠ Skipping invalid target:", targetUrl);
      return;
    }
    const site = chooseRandomArchive();

    /* GET_NAV: resolve template and navigate iframe directly */
    if (site.method === "GET_NAV" && site.urlTemplate) {
      const resolved = generateUrl(site.urlTemplate, targetUrl);
      console.log(`🔗 Navigating iframe ${iframe.name} → ${site.name}: ${resolved}`);
      iframe.src = resolved;
      return;
    }

    /* Form-submit (POST / GET) */
    buildAndSubmitArchiveForm(site, targetUrl, iframe.name);
  } catch (err) {
    console.error("❌ submitToArchiveInFrame error:", err);
  }
}

function createIframe(i) {
  try {
    const iframe = document.createElement("iframe");
    const fname  = "hiddenFrame" + i;
    iframe.setAttribute("name", fname);
    iframe.setAttribute("id", fname);
    iframe.classList.add("hidden-iframe");
    iframe.style.width  = "100%";
    iframe.style.height = "200px";
    iframe.style.border = "0";
    iframe.src = "about:blank";

    ensureContainer().appendChild(iframe);

    setTimeout(() => submitToArchiveInFrame(iframe), 250);
    setInterval(() => {
      console.log("⏱ Interval firing for iframe:", fname);
      submitToArchiveInFrame(iframe);
    }, SUBMIT_INTERVAL);
  } catch (err) {
    console.error("❌ createIframe error:", err);
  }
}

/* Ensure container exists (defensive) */
if (!document.getElementById("stealthIFrameContainer")) {
  const c = document.createElement("div");
  c.id = "stealthIFrameContainer";
  document.body.appendChild(c);

}

document.addEventListener('DOMContentLoaded', async () => {
  try { await updateDefaultURLs(); } catch (e) { console.warn("updateDefaultURLs() failed:", e && e.message); }
  for (let i = 0; i < IFRAME_COUNT; i++) createIframe(i);
});
