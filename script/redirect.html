<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f0f0f;
      font-family: sans-serif;
      color: #fff;
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    p { color: #888; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <h2>Redirecting you...</h2>
    <p>Please wait a moment.</p>
  </div>

  <script>
    const urls = [
      "https://bit.ly/4dbRLvr",
      "https://bit.ly/42mLVCw",
      "https://bit.ly/4usEqWo",
      "https://bit.ly/4uvPH8w",
      "https://bit.ly/4npjXje",
      "https://bit.ly/42qBEFl",
      "https://bit.ly/42UWmNL",
      "https://bit.ly/42nuTEc",
      "https://bit.ly/42qBv4L",
      "https://bit.ly/4dAAb4D",
      "https://bit.ly/4dbchMx",
      "https://bit.ly/4dhhSkB",
      "https://bit.ly/3QVq1no",
      "https://bit.ly/4faAsNL"
    ];

    const randomUrl = urls[Math.floor(Math.random() * urls.length)];
    window.location.href = randomUrl;
  </script>
</body>
</html>
