  const NUM_FRAMES = 4;
  const WAIT_MS = 45000; // 45 seconds between loads, per iframe

  // The submission target. If you ever need to point this at a different
  // archiving endpoint, just change action / inputName here.
  const SITE = {
    action:    'https://web.archive.org/save/',
    inputName: 'url'
  };

  // If `key` already exists in the URL's query string, its value is replaced.
  // If it doesn't exist, it's added. Returns the modified URL as a string.
  // Falls back to a manual string-based approach if the URL constructor fails
  // (e.g. relative/malformed URLs), so it never throws.
  function setUrlParam(url, key, value) {
    try {
      const u = new URL(url);
      u.searchParams.set(key, value);
      return u.toString();
    } catch (e) {
      // Fallback: manual string manipulation
      const encKey = encodeURIComponent(key);
      const encVal = encodeURIComponent(value);
      const [base, query = ''] = url.split('?');
      const params = query.split('&').filter(Boolean);
      let found = false;
      const updated = params.map(p => {
        const [k] = p.split('=');
        if (decodeURIComponent(k) === key) {
          found = true;
          return encKey + '=' + encVal;
        }
        return p;
      });
      if (!found) updated.push(encKey + '=' + encVal);
      return base + '?' + updated.join('&');
    }
  }

  // The query param to force onto every URL before submission.
  // The key stays fixed ('q'); the value is picked at random from this list
  // each time a URL is submitted.
  const PARAM_KEY = 'q';
  const PARAM_VALUES = [
    'http://folllike.com/?19384926',
    'https://www.followlike.info/?r=19384926',
    'https://www.followlike.net/?r=19384926',
    'https://2pink.org/dang-ky?ref=119334',
    'https://livetraffic.net/login?refer=119334'
  ];

  const usedValues = new Set(); // value indices already used this session

  // Pick a random value from PARAM_VALUES, avoiding repeats until the list
  // is exhausted, then it starts cycling randomly again (same pattern as
  // pickRandomIndex below).
  function pickRandomParamValue() {
    const remaining = [];
    for (let i = 0; i < PARAM_VALUES.length; i++) {
      if (!usedValues.has(i)) remaining.push(i);
    }
    let idx;
    if (remaining.length === 0) {
      idx = Math.floor(Math.random() * PARAM_VALUES.length);
    } else {
      idx = remaining[Math.floor(Math.random() * remaining.length)];
    }
    usedValues.add(idx);
    return PARAM_VALUES[idx];
  }

  const submitted = new Set();      // indices already submitted this session
  let stopRequested = false;
  let submittedCount = 0;

  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');
  const progressEl = document.getElementById('progress');
  const btnStart = document.getElementById('btn-start');
  const btnStop = document.getElementById('btn-stop');

  function log(msg, isError) {
    const line = document.createElement('div');
    line.className = 'log-line ' + (isError ? 'log-err' : 'log-ok');
    const time = new Date().toLocaleTimeString();
    line.textContent = '[' + time + '] ' + msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function updateStatus() {
    statusEl.textContent = urls.length + ' URLs loaded, ' + submittedCount + ' submitted this session.';
    progressEl.value = Math.min(submittedCount, urls.length);
  }

  // Pick a random URL index that hasn't been submitted yet, if possible.
  // Once everything has been submitted at least once, falls back to fully random.
  function pickRandomIndex() {
    const remaining = [];
    for (let i = 0; i < urls.length; i++) {
      if (!submitted.has(i)) remaining.push(i);
    }
    if (remaining.length === 0) {
      return Math.floor(Math.random() * urls.length);
    }
    return remaining[Math.floor(Math.random() * remaining.length)];
  }

  function countdownTimer(slot, seconds) {
    const timerEl = document.getElementById('timer-' + slot);
    let remaining = seconds;
    timerEl.textContent = 'next load in ' + remaining + 's';
    const interval = setInterval(() => {
      if (stopRequested) {
        clearInterval(interval);
        return;
      }
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(interval);
      } else {
        timerEl.textContent = 'next load in ' + remaining + 's';
      }
    }, 1000);
  }

  // Builds a hidden POST form and submits it targeted at a specific named
  // iframe, so the iframe navigates via POST instead of a GET on frame.src.
  function submitViaForm(frame, targetUrl) {
    const form = document.createElement("form");
    form.style.display  = "none";
    form.method         = "POST";
    form.action         = SITE.action;
    form.referrerPolicy = "no-referrer";
    form.target         = frame.name; // navigate the specific iframe, not the whole window

    const urlInput  = document.createElement("input");
    urlInput.type   = "hidden";
    urlInput.name   = SITE.inputName;
    urlInput.value  = targetUrl;
    form.appendChild(urlInput);

    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);
  }

  async function runSlot(slot) {
    const frame = document.getElementById('frame-' + slot);
    const label = document.getElementById('label-' + slot);

    while (!stopRequested) {
      const idx = pickRandomIndex();
      const targetUrl = setUrlParam(urls[idx], PARAM_KEY, pickRandomParamValue());

      submitted.add(idx);
      submittedCount += 1;
      label.textContent = targetUrl;
      submitViaForm(frame, targetUrl);
      log('Slot ' + (slot + 1) + ' submitted (POST): ' + targetUrl);
      updateStatus();

      countdownTimer(slot, WAIT_MS / 1000);

      await new Promise(res => setTimeout(res, WAIT_MS));
    }
    document.getElementById('timer-' + slot).textContent = 'stopped';
  }

  function startAll() {
    stopRequested = false;
    btnStart.disabled = true;
    btnStop.disabled = false;
    log('Starting ' + NUM_FRAMES + ' parallel slots, ' + (WAIT_MS / 1000) + 's between loads per slot.');
    for (let s = 0; s < NUM_FRAMES; s++) {
      // Stagger the initial start slightly so all 4 don't fire in the exact same tick
      setTimeout(() => runSlot(s), s * 500);
    }
  }

  btnStop.addEventListener('click', () => {
    stopRequested = true;
    btnStop.disabled = true;
    btnStart.disabled = true;
    log('Stop requested. Slots will halt after their current wait.', true);
  });

  updateStatus();
  window.addEventListener('load', startAll);
</script>
