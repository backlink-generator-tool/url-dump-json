<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
    color: #222;
  }
  h1 { font-size: 1.4rem; }
  #controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  button {
    padding: 8px 14px;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid #888;
    border-radius: 6px;
    background: #f5f5f5;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status {
    margin: 10px 0;
    font-size: 14px;
    color: #444;
  }
  progress { width: 100%; margin: 10px 0; }
  #frames {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 12px;
  }
  .frame-box {
    border: 1px solid #ccc;
    border-radius: 6px;
    overflow: hidden;
  }
  .frame-label {
    font-family: monospace;
    font-size: 11px;
    background: #eee;
    padding: 4px 8px;
    word-break: break-all;
  }
  .frame-timer {
    font-family: monospace;
    font-size: 11px;
    color: #666;
    padding: 2px 8px;
    background: #f7f7f7;
  }
  iframe {
    width: 100%;
    height: 260px;
    border: none;
    display: block;
  }
  #log {
    font-family: monospace;
    font-size: 12px;
    max-height: 260px;
    overflow-y: auto;
    background: #fafafa;
    border: 1px solid #ddd;
    padding: 8px;
    border-radius: 6px;
    margin-top: 16px;
  }
  .log-line { margin: 2px 0; }
  .log-ok { color: #0a7d28; }
  .log-err { color: #b3261e; }
</style>

<h1>Submit URLs to the Wayback Machine</h1>
<p>187 URLs loaded as a static array. 4 iframes run in parallel, each one loading the next random URL 45 seconds after its previous load. Starts automatically on page load.</p>

<div id="controls">
  <button id="btn-start" disabled>Running automatically&hellip;</button>
  <button id="btn-stop">Stop</button>
</div>

<progress id="progress" value="0" max="187"></progress>
<div id="status">Starting&hellip;</div>

<div id="frames">
  <div class="frame-box">
    <div class="frame-label" id="label-0">&mdash;</div>
    <div class="frame-timer" id="timer-0">waiting&hellip;</div>
    <iframe id="frame-0" title="Wayback save slot 1"></iframe>
  </div>
  <div class="frame-box">

  </div>
</div>

  const NUM_FRAMES = 4;
  const WAIT_MS = 45000; // 45 seconds between loads, per iframe

  const submitted = new Set();      // indices already submitted this session
  let stopRequested = false;
  let submittedCount = 0;

  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');
  const progressEl = document.getElementById('progress');
  const btnStart = document.getElementById('btn-start');
  const btnStop = document.getElementById('btn-stop');

  function log(msg, isError) {
    const line = document.createElement('div');
    line.className = 'log-line ' + (isError ? 'log-err' : 'log-ok');
    const time = new Date().toLocaleTimeString();
    line.textContent = '[' + time + '] ' + msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function updateStatus() {
    statusEl.textContent = urls.length + ' URLs loaded, ' + submittedCount + ' submitted this session.';
    progressEl.value = Math.min(submittedCount, urls.length);
  }

  // Pick a random URL index that hasn't been submitted yet, if possible.
  // Once everything has been submitted at least once, falls back to fully random.
  function pickRandomIndex() {
    const remaining = [];
    for (let i = 0; i < urls.length; i++) {
      if (!submitted.has(i)) remaining.push(i);
    }
    if (remaining.length === 0) {
      return Math.floor(Math.random() * urls.length);
    }
    return remaining[Math.floor(Math.random() * remaining.length)];
  }

  function countdownTimer(slot, seconds) {
    const timerEl = document.getElementById('timer-' + slot);
    let remaining = seconds;
    timerEl.textContent = 'next load in ' + remaining + 's';
    const interval = setInterval(() => {
      if (stopRequested) {
        clearInterval(interval);
        return;
      }
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(interval);
      } else {
        timerEl.textContent = 'next load in ' + remaining + 's';
      }
    }, 1000);
  }

  async function runSlot(slot) {
    const frame = document.getElementById('frame-' + slot);
    const label = document.getElementById('label-' + slot);

    while (!stopRequested) {
      const idx = pickRandomIndex();
      const targetUrl = urls[idx];
      const saveUrl = 'https://web.archive.org/save/' + targetUrl;

      submitted.add(idx);
      submittedCount += 1;
      label.textContent = targetUrl;
      frame.src = saveUrl;
      log('Slot ' + (slot + 1) + ' submitted: ' + targetUrl);
      updateStatus();

      countdownTimer(slot, WAIT_MS / 1000);

      await new Promise(res => setTimeout(res, WAIT_MS));
    }
    document.getElementById('timer-' + slot).textContent = 'stopped';
  }

  function startAll() {
    stopRequested = false;
    btnStart.disabled = true;
    btnStop.disabled = false;
    log('Starting ' + NUM_FRAMES + ' parallel slots, ' + (WAIT_MS / 1000) + 's between loads per slot.');
    for (let s = 0; s < NUM_FRAMES; s++) {
      // Stagger the initial start slightly so all 4 don't fire in the exact same tick
      setTimeout(() => runSlot(s), s * 500);
    }
  }

  btnStop.addEventListener('click', () => {
    stopRequested = true;
    btnStop.disabled = true;
    btnStart.disabled = true;
    log('Stop requested. Slots will halt after their current wait.', true);
  });

  updateStatus();
  window.addEventListener('load', startAll);
</script>
